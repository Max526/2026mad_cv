name: Build and deploy ASP.Net Core app to Azure Web App - Githubmad

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore 2026mad_cv/2026mad_cv.csproj

      - name: Build
        run: dotnet build 2026mad_cv/2026mad_cv.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish 2026mad_cv/2026mad_cv.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C4732CDE59C94849ACE3671C1A4C611F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_92C657B77B2D4077BA057509AFE3A839 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7FF2C2D206BA42329F35387D7F0C4796 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Githubmad'
          package: ./publish
